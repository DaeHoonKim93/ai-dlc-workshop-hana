version: '3.8'

services:
  # ============================================
  # Unit 1: Backend-Core (인증/인가 + 직원 관리)
  # ============================================
  unit1:
    build:
      context: ./table-order-backend
      dockerfile: unit1-app/Dockerfile
    container_name: table-order-unit1
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-table-order-dev-secret-key-minimum-32-characters}
      - SERVER_PORT=8081
    networks:
      - table-order-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/unit1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ============================================
  # Unit 2: Backend-Domain (테이블/메뉴/주문/SSE)
  # ============================================
  unit2:
    build:
      context: ./table-order-backend
      dockerfile: unit2-app/Dockerfile
    container_name: table-order-unit2
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-table-order-dev-secret-key-minimum-32-characters}
      - SERVER_PORT=8082
    depends_on:
      unit1:
        condition: service_healthy
    networks:
      - table-order-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/unit2/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ============================================
  # Unit 3 + 4: Frontend (Customer + Admin)
  # 하나의 Node 컨테이너에서 두 프론트엔드 서빙
  # ============================================
  frontend:
    build:
      context: ./table-order-frontend
      dockerfile: Dockerfile
    container_name: table-order-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - UNIT1_API_URL=http://unit1:8081/unit1
      - UNIT2_API_URL=http://unit2:8082/unit2
    depends_on:
      unit1:
        condition: service_healthy
      unit2:
        condition: service_healthy
    networks:
      - table-order-net
    restart: unless-stopped

networks:
  table-order-net:
    driver: bridge
