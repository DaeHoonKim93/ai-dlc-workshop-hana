spring:
  profiles:
    active: dev
  application:
    name: table-order-unit1

server:
  port: 8081
  servlet:
    context-path: /unit1

jwt:
  secret-key: ${JWT_SECRET_KEY:table-order-dev-secret-key-minimum-32-characters}
  access-token-expiration: 57600000
  refresh-token-expiration: 604800000

logging:
  level:
    com.tableorder: INFO
    org.springframework.web: INFO
