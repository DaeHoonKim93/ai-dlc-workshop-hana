spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tableorder}
    username: ${DB_USERNAME:tableorder}
    password: ${DB_PASSWORD:tableorder}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000
  jpa:
    show-sql: true

logging:
  level:
    com.tableorder: DEBUG
    org.hibernate.SQL: DEBUG
